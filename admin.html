<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockFlow Admin - Smooth Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f4f7fe; }
        .sidebar-active { background: #6366f1; color: white !important; box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4); transform: translateX(5px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        tr:hover { background-color: #f8fafc; transition: 0.2s; }
    </style>
</head>
<body class="text-slate-800">

    <div class="flex h-screen overflow-hidden">
        <aside class="w-72 bg-[#0b1437] text-white flex flex-col shadow-2xl transition-all">
            <div class="p-8 border-b border-white/5 flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-layer-group"></i></div>
                <span class="text-xl font-bold italic tracking-tighter">STOCKFLOW <span class="text-indigo-400">ADMIN</span></span>
            </div>
            <nav class="p-6 flex flex-col gap-3">
                <button onclick="showSection('master')" id="btnMaster" class="p-4 rounded-2xl flex items-center gap-4 sidebar-active"><i class="fas fa-database text-sm"></i><span class="font-bold text-xs uppercase tracking-widest">Master Database</span></button>
                <button onclick="showSection('report')" id="btnReport" class="p-4 rounded-2xl flex items-center gap-4 text-slate-400 hover:bg-white/5"><i class="fas fa-clipboard-check text-sm"></i><span class="font-bold text-xs uppercase tracking-widest">Laporan Batch</span></button>
            </nav>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white px-10 py-8 border-b border-slate-200 flex justify-between items-center z-10">
                <div><h2 id="sectionTitle" class="text-3xl font-extrabold text-[#1b2559]">Master Database</h2><p class="text-[10px] text-slate-400 font-bold uppercase tracking-[3px] mt-1 italic">Format Tanggal: DD-MM-YYYY</p></div>
                <div class="flex items-center gap-4">
                    <select id="statusFilter" onchange="renderTable()" class="hidden bg-slate-50 border border-slate-200 px-4 py-3 rounded-xl font-bold text-[11px] outline-none"><option value="ALL">SEMUA KUALITAS</option><option value="AMAN">KUALITAS: AMAN</option><option value="RETUR">KUALITAS: RETUR</option><option value="BROKEN">KUALITAS: BROKEN</option></select>
                    <button id="exportBtn" onclick="exportExcel()" class="hidden bg-emerald-600 text-white px-6 py-3 rounded-xl font-bold text-[11px] shadow-lg active:scale-95 transition-all"><i class="fas fa-file-excel mr-2"></i> EXPORT</button>
                    <button onclick="fetchCloudData()" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold text-[11px] shadow-lg active:scale-95 transition-all"><i class="fas fa-sync-alt mr-2" id="refreshIcon"></i> REFRESH</button>
                </div>
            </header>

            <main class="p-10 overflow-y-auto">
                <div id="tableContainer" class="bg-white rounded-[35px] shadow-sm border border-slate-100 overflow-hidden animate-fade">
                    <table class="w-full text-left">
                        <thead id="tableHead" class="bg-slate-50/50 border-b border-slate-100 font-black text-slate-400 text-[10px] uppercase tracking-widest"></thead>
                        <tbody id="tableBody" class="text-sm divide-y divide-slate-50 font-medium text-slate-600"></tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyoagMz3yOEI-At8tw9NDP_DKK90CMZWXlhBO6GZ9llIh36Zxzw9Px0Gl5uZYZziR0/exec'; 
        let cachedData = [], currentMode = 'master';

        async function fetchCloudData() {
            const icon = document.getElementById('refreshIcon'); icon.classList.add('fa-spin');
            try { const res = await fetch(API_URL); cachedData = await res.json(); renderTable(); } 
            catch (err) { console.error("Sync Error"); } 
            finally { setTimeout(() => icon.classList.remove('fa-spin'), 500); }
        }

        function calculateQuality(dateStr) {
            if (!dateStr || !dateStr.includes('-')) return { txt: "NO DATA", cls: "bg-slate-100 text-slate-400" };
            const p = dateStr.split('-');
            const exp = new Date(p[2], p[1]-1, p[0]), now = new Date();
            const diff = (exp - now) / (1000 * 60 * 60 * 24 * 30.44);
            if (exp < now) return { txt: "BROKEN", cls: "bg-rose-100 text-rose-600" };
            if (diff <= 3) return { txt: "RETUR", cls: "bg-amber-100 text-amber-600" };
            return { txt: "AMAN", cls: "bg-emerald-100 text-emerald-600" };
        }

        function showSection(mode) {
            currentMode = mode;
            document.getElementById('tableContainer').style.animation = 'none';
            document.getElementById('tableContainer').offsetHeight; 
            document.getElementById('tableContainer').style.animation = null;
            document.getElementById('sectionTitle').innerText = mode === 'master' ? 'Master Database' : 'Laporan Batch';
            document.getElementById('statusFilter').classList.toggle('hidden', mode === 'master');
            document.getElementById('exportBtn').classList.toggle('hidden', mode === 'master');
            document.getElementById('btnMaster').className = mode === 'master' ? "p-4 rounded-2xl flex items-center gap-4 transition-all sidebar-active" : "p-4 rounded-2xl flex items-center gap-4 transition-all text-slate-400 hover:bg-white/5";
            document.getElementById('btnReport').className = mode === 'report' ? "p-4 rounded-2xl flex items-center gap-4 transition-all sidebar-active" : "p-4 rounded-2xl flex items-center gap-4 transition-all text-slate-400 hover:bg-white/5";
            renderTable();
        }

        function renderTable() {
            const thead = document.getElementById('tableHead'), tbody = document.getElementById('tableBody');
            const filterVal = document.getElementById('statusFilter').value;
            let data = [...cachedData];
            if (currentMode === 'master') {
                const seen = new Set();
                data = data.filter(i => { if (seen.has(i.item_id)) return false; seen.add(i.item_id); return true; });
                thead.innerHTML = `<tr><th class="px-8 py-5">Item ID</th><th class="px-8 py-5">Produk</th><th class="px-8 py-5 text-center">Stok Global</th><th class="px-8 py-5 text-center">Status</th></tr>`;
            } else {
                data = data.filter(i => (i.tgl_expired || "").length > 5).map(i => ({...i, q: calculateQuality(i.tgl_expired)}));
                if(filterVal !== "ALL") data = data.filter(i => i.q.txt === filterVal);
                thead.innerHTML = `<tr><th class="px-8 py-6">ID</th><th class="px-8 py-6">Produk</th><th class="px-8 py-6 text-center">Qty</th><th class="px-8 py-6">Expired</th><th class="px-8 py-6 text-center">Status</th><th class="px-8 py-6 text-center">Aksi</th></tr>`;
            }
            tbody.innerHTML = data.map(i => `
                <tr class="border-b">
                    <td class="px-8 py-5 font-bold text-indigo-600">#${i.item_id}</td>
                    <td class="px-8 py-5 font-extrabold uppercase text-[#1b2559]">${i.produk}</td>
                    <td class="px-8 py-5 text-center font-black text-xl">${i.stok}</td>
                    ${currentMode === 'report' ? 
                        `<td class="px-8 py-5 font-bold text-indigo-400">${i.tgl_expired}</td>
                         <td class="px-8 py-5 text-center"><span class="px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest ${i.q.cls}">${i.q.txt}</span></td>
                         <td class="px-8 py-5 text-center"><button onclick="delRow(event, '${i.item_id}', '${i.tgl_expired}', '${i.stok}')" class="text-rose-400 p-2 hover:text-rose-600 active:scale-75 transition-all"><i class="fas fa-trash-alt"></i></button></td>` : 
                        `<td class="px-8 py-5 text-center"><span class="px-3 py-1 rounded-lg text-[9px] font-black ${parseInt(i.stok)<10?'bg-rose-50 text-rose-500':'bg-emerald-50 text-emerald-600'}">${parseInt(i.stok)<10?'LIMIT':'OKE'}</span></td>`}
                </tr>`).join('');
        }

        async function delRow(e, id, exp, stok) {
            if (!confirm("Hapus 1 baris ini?")) return;
            const btn = e.currentTarget; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            try { await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'DELETE', item_id: id, tgl_expired: exp, stok: stok }) }); fetchCloudData(); } catch (err) { alert("Gagal"); }
        }

        function exportExcel() {
            const d = cachedData.filter(i => (i.tgl_expired || "").length > 5).map(i => ({ ID: i.item_id, Produk: i.produk, Stok: i.stok, Expired: i.tgl_expired, Kualitas: calculateQuality(i.tgl_expired).txt }));
            const ws = XLSX.utils.json_to_sheet(d); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "StockFlow"); XLSX.writeFile(wb, "StockFlow_Laporan.xlsx");
        }
        fetchCloudData();
    </script>
</body>
</html>
