<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StockFlow User - Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .click-active:active { transform: scale(0.95); transition: 0.1s; }
        .sheet-container { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 40px 40px 0 0; padding: 30px; z-index: 100; transform: translateY(105%); transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); will-change: transform; cursor: grab; touch-action: none; }
        .sheet-up { transform: translateY(0); }
        .is-dragging { transition: none !important; }
        .glass-header { background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.6); backdrop-filter: blur(4px); z-index: 90; display: none; opacity: 0; transition: opacity 0.3s; }
        .no-scroll { overflow: hidden; height: 100vh; position: fixed; width: 100%; }
    </style>
</head>
<body>

    <a href="https://wa.me/6283875048659" target="_blank" class="fixed bottom-6 right-6 w-14 h-14 bg-emerald-500 rounded-full flex items-center justify-center text-white shadow-2xl z-50 click-active"><i class="fab fa-whatsapp text-2xl"></i></a>

    <header class="glass-header text-white p-6 pb-8 rounded-b-[40px] sticky top-0 z-40 shadow-xl">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-black italic uppercase tracking-tighter">StockFlow <span class="text-indigo-400">User</span></h1>
            <button onclick="loadData()" class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center click-active"><i class="fas fa-sync-alt text-xs" id="syncIcon"></i></button>
        </div>
        <div class="bg-black/20 p-1 rounded-2xl flex gap-1 text-[10px] font-black uppercase">
            <button onclick="switchTab('db')" id="tabDB" class="flex-1 py-4 rounded-xl bg-indigo-600 shadow-lg transition-all">Database</button>
            <button onclick="switchTab('res')" id="tabRes" class="flex-1 py-4 rounded-xl text-slate-400 transition-all">History</button>
        </div>
    </header>

    <main class="p-6">
        <input type="text" id="searchInput" onkeyup="filterData()" placeholder="Cari nama produk..." class="w-full bg-white border-none rounded-3xl py-5 px-8 shadow-sm font-bold text-sm outline-none focus:ring-2 focus:ring-indigo-500 mb-6">
        <div id="itemList" class="space-y-4 pb-32"></div>
    </main>

    <div id="overlay" class="overlay" onclick="closeModal()"></div>
    <div id="modal" class="sheet-container">
        <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-8"></div>
        <h3 id="mNama" class="text-2xl font-black text-center uppercase">Produk</h3>
        <p id="mId" class="text-center text-indigo-500 text-[10px] font-black tracking-widest uppercase mb-8">ID</p>
        <form id="formIn" class="space-y-6">
            <input type="hidden" id="fId"><input type="hidden" id="fNama"><input type="hidden" id="fVendor">
            <div class="bg-slate-50 rounded-[30px] p-2 border flex items-center justify-between">
                <button type="button" onclick="adj(-1)" class="w-14 h-14 bg-white rounded-2xl shadow-sm text-indigo-600 font-black">-</button>
                <input type="number" id="fStok" class="bg-transparent text-center font-black text-4xl w-24 border-none outline-none" value="1">
                <button type="button" onclick="adj(1)" class="w-14 h-14 bg-white rounded-2xl shadow-sm text-indigo-600 font-black">+</button>
            </div>
            <input type="date" id="fExp" required class="w-full bg-slate-50 p-5 rounded-[25px] font-bold text-center border outline-none">
            <button type="submit" id="btnSave" class="w-full py-6 bg-indigo-600 text-white rounded-[30px] font-black shadow-xl uppercase italic tracking-widest">Simpan Batch</button>
        </form>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyoagMz3yOEI-At8tw9NDP_DKK90CMZWXlhBO6GZ9llIh36Zxzw9Px0Gl5uZYZziR0/exec'; 
        let allData = [], currentTab = 'db', isDeleting = false;

        // FUNGSI BALIK TANGGAL (Indo)
        const toIndoDate = (str) => { if(!str.includes('-')) return str; const [y,m,d] = str.split('-'); return `${d}-${m}-${y}`; };

        async function loadData() {
            document.getElementById('syncIcon').classList.add('fa-spin');
            try {
                const res = await fetch(API_URL);
                allData = await res.json();
                localStorage.setItem('sf_cache', JSON.stringify(allData));
                filterData();
            } catch (e) { console.error("Sync Error"); }
            finally { document.getElementById('syncIcon').classList.remove('fa-spin'); }
        }

        function filterData() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            let data = currentTab === 'db' ? allData.filter((v,i,a) => a.findIndex(t => t.item_id === v.item_id) === i) : allData.filter(i => (i.tgl_expired || "").length > 5);
            render(data.filter(i => (i.produk||"").toLowerCase().includes(q) || (i.item_id||"").includes(q)));
        }

        function render(data) {
            const list = document.getElementById('itemList');
            list.innerHTML = "";
            if(!data.length) { list.innerHTML = `<p class="text-center py-20 text-slate-300 italic font-bold">Data Kosong</p>`; return; }
            list.innerHTML = data.map(i => `
                <div class="bg-white p-5 rounded-[30px] flex items-center justify-between shadow-sm active:bg-slate-50 transition-all" onclick="openModal('${i.item_id}', '${i.produk}', '${i.vendor||''}')">
                    <div class="flex items-center gap-4 flex-1">
                        <div class="w-12 h-12 bg-indigo-50 text-indigo-500 rounded-2xl flex items-center justify-center shadow-inner"><i class="fas fa-box text-lg"></i></div>
                        <div><h4 class="font-bold text-[13px] uppercase text-slate-800">${i.produk}</h4><p class="text-[9px] text-slate-400 font-black tracking-widest">ID: #${i.item_id} ${currentTab==='res'?' • '+i.tgl_expired:''}</p></div>
                    </div>
                    ${currentTab==='res'?`<div class="flex items-center gap-3"><span class="font-black text-indigo-600 mr-2">${i.stok}</span><button onclick="del(event, '${i.item_id}', '${i.tgl_expired}', '${i.stok}')" class="w-10 h-10 bg-rose-50 text-rose-500 rounded-xl flex items-center justify-center click-active"><i class="fas fa-trash-alt text-xs"></i></button></div>`:'<i class="fas fa-plus-circle text-indigo-200 text-xl"></i>'}
                </div>`).join('');
        }

        async function del(e, id, exp, stok) {
            e.stopPropagation();
            if(isDeleting || !confirm("Hapus 1 baris ini?")) return;
            isDeleting = true;
            const btn = e.target.closest('button'); btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action:'DELETE', item_id:id, tgl_expired:exp, stok:stok }) });
                await loadData();
            } catch(e) { alert("Gagal"); }
            finally { isDeleting = false; }
        }

        function openModal(id, nm, vn) {
            if(currentTab === 'res') return;
            document.getElementById('fId').value = id; document.getElementById('fNama').value = nm; document.getElementById('fVendor').value = vn;
            document.getElementById('mNama').innerText = nm; document.getElementById('mId').innerText = "ID: #" + id;
            document.getElementById('fStok').value = 1; document.getElementById('fExp').value = "";
            document.getElementById('overlay').style.display = 'block';
            document.body.classList.add('no-scroll');
            setTimeout(() => { document.getElementById('overlay').style.opacity = '1'; document.getElementById('modal').classList.add('sheet-up'); }, 10);
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('sheet-up');
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('overlay').style.display = 'none'; document.body.classList.remove('no-scroll'); }, 400);
        }

        function adj(v) { const el = document.getElementById('fStok'); el.value = Math.max(1, parseInt(el.value)+v); }

        document.getElementById('formIn').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSave'); btn.innerText = 'MEMPROSES...'; btn.disabled = true;
            const payload = { item_id: document.getElementById('fId').value, produk: document.getElementById('fNama').value, stok: document.getElementById('fStok').value, vendor: document.getElementById('fVendor').value, tgl_expired: toIndoDate(document.getElementById('fExp').value) };
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                closeModal(); await loadData(); switchTab('res');
            } catch(e) { alert("Gagal"); }
            finally { btn.innerText = 'SIMPAN BATCH'; btn.disabled = false; }
        };

        function switchTab(t) {
            currentTab = t;
            document.getElementById('tabDB').className = t==='db' ? 'flex-1 py-4 rounded-xl bg-indigo-600 shadow-lg transition-all' : 'flex-1 py-4 rounded-xl text-slate-400 transition-all';
            document.getElementById('tabRes').className = t==='res' ? 'flex-1 py-4 rounded-xl bg-indigo-600 shadow-lg transition-all' : 'flex-1 py-4 rounded-xl text-slate-400 transition-all';
            filterData();
        }

        const cache = localStorage.getItem('sf_cache');
        if(cache) { allData = JSON.parse(cache); filterData(); }
        loadData();
    </script>
</body>
</html>
